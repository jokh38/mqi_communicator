<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQI Communicator Dashboard</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/dashboard.css">
    <script>
        const preservedScrollPositions = new Map();
        let lastSuccessfulRefreshAt = null;
        let connectionState = 'connecting';

        function getScrollKey(element) {
            return element.dataset.scrollKey || element.id;
        }

        function captureScrollPositions(root = document) {
            root.querySelectorAll('[data-preserve-scroll]').forEach((element) => {
                const key = getScrollKey(element);
                if (!key) {
                    return;
                }

                preservedScrollPositions.set(key, {
                    top: element.scrollTop,
                    left: element.scrollLeft
                });
            });
        }

        function restoreScrollPositions(root = document) {
            root.querySelectorAll('[data-preserve-scroll]').forEach((element) => {
                const key = getScrollKey(element);
                const position = key ? preservedScrollPositions.get(key) : null;
                if (!position) {
                    return;
                }

                element.scrollTop = position.top;
                element.scrollLeft = position.left;
            });
        }

        function applyExpandedWorkflowStateToRoot(root = document) {
            if (typeof window.expandedWorkflowCases === 'undefined') {
                return;
            }

            const expandedCases = window.expandedWorkflowCases;
            const caseRows = root.querySelectorAll('[data-case-row][data-case-id]');
            const visibleCaseIds = new Set();

            caseRows.forEach((row) => {
                const caseId = row.dataset.caseId;
                if (!caseId) {
                    return;
                }

                visibleCaseIds.add(caseId);

                const expanded = expandedCases.has(caseId);
                const beamRows = root.querySelectorAll(`[data-beam-row][data-case-id="${caseId}"]`);
                beamRows.forEach((beamRow) => {
                    beamRow.classList.toggle('hidden', !expanded);
                });

                const chevron = root.querySelector(`#chevron-${CSS.escape(caseId)}`) || document.getElementById(`chevron-${caseId}`);
                if (chevron) {
                    chevron.style.transform = expanded ? 'rotate(90deg)' : 'rotate(0deg)';
                }
            });

            Array.from(expandedCases).forEach((caseId) => {
                if (!visibleCaseIds.has(caseId)) {
                    expandedCases.delete(caseId);
                }
            });
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) {
                return 'Never';
            }

            return new Intl.DateTimeFormat([], {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }).format(timestamp);
        }

        function closeModal() {
            const modalContainer = document.getElementById('modal-container');
            if (!modalContainer) {
                return;
            }

            modalContainer.replaceChildren();
        }

        function setSelectedCase(caseId, root = document) {
            const selectedInput = document.getElementById('selected-case-id');
            if (selectedInput) {
                selectedInput.value = caseId || '';
            }

            root.querySelectorAll('[data-case-select-row]').forEach((row) => {
                const isSelected = row.dataset.caseId === caseId;
                row.classList.toggle('bg-indigo-100', isSelected);
                row.classList.toggle('ring-1', isSelected);
                row.classList.toggle('ring-inset', isSelected);
                row.classList.toggle('ring-indigo-400', isSelected);
                row.classList.toggle('hover:bg-indigo-50', !isSelected);

                const caseIdCell = row.querySelector('td');
                if (caseIdCell) {
                    caseIdCell.classList.toggle('text-indigo-900', isSelected);
                    caseIdCell.classList.toggle('text-gray-900', !isSelected);
                }

                let badge = row.querySelector('[data-selected-badge]');
                if (isSelected && !badge) {
                    badge = document.createElement('span');
                    badge.dataset.selectedBadge = 'true';
                    badge.className = 'inline-flex items-center rounded-full bg-indigo-600 px-2 py-0.5 text-xs font-semibold text-white';
                    badge.textContent = 'Selected';
                    row.querySelector('td > div')?.appendChild(badge);
                } else if (!isSelected && badge) {
                    badge.remove();
                }
            });
        }

        function restoreSelectedCase(root = document) {
            const selectedInput = document.getElementById('selected-case-id');
            if (!selectedInput || !selectedInput.value) {
                return;
            }

            setSelectedCase(selectedInput.value, root);
        }

        function setConnectionState(nextState, details = '') {
            connectionState = nextState;

            const badge = document.getElementById('connection-status-badge');
            const label = document.getElementById('connection-status-label');
            const detail = document.getElementById('connection-status-detail');
            const banner = document.getElementById('connection-banner');
            const bannerTitle = document.getElementById('connection-banner-title');
            const bannerDetail = document.getElementById('connection-banner-detail');

            if (!badge || !label || !detail || !banner || !bannerTitle || !bannerDetail) {
                return;
            }

            badge.className = 'text-sm text-white px-2 py-1 rounded-full font-medium';

            if (nextState === 'connecting') {
                badge.classList.add('bg-yellow-500');
                label.textContent = 'Connecting';
                detail.textContent = details || 'Waiting for the first successful refresh.';
                bannerTitle.textContent = 'Connecting to dashboard';
                bannerDetail.textContent = details || 'Waiting for the first successful refresh.';
                banner.classList.remove('hidden');
                return;
            }

            if (nextState === 'connected') {
                badge.classList.add('bg-green-500');
                label.textContent = 'Connected';
                detail.textContent = `Last update ${formatTimestamp(lastSuccessfulRefreshAt)}`;
                banner.classList.add('hidden');
                return;
            }

            if (nextState === 'reconnecting') {
                badge.classList.add('bg-yellow-500');
                label.textContent = 'Reconnecting';
                detail.textContent = details || `Last update ${formatTimestamp(lastSuccessfulRefreshAt)}`;
                bannerTitle.textContent = 'Dashboard connection is unstable';
                bannerDetail.textContent = details || 'The UI has stopped receiving fresh data and is trying to reconnect.';
                banner.classList.remove('hidden');
                return;
            }

            badge.classList.add('bg-red-600');
            label.textContent = 'Disconnected';
            detail.textContent = details || `Last update ${formatTimestamp(lastSuccessfulRefreshAt)}`;
            bannerTitle.textContent = 'Dashboard disconnected';
            bannerDetail.textContent = details || 'No fresh data is arriving. The screen may look normal, but it is stale.';
            banner.classList.remove('hidden');
        }

        function markSuccessfulRefresh() {
            lastSuccessfulRefreshAt = new Date();
            setConnectionState('connected');
        }

        function evaluateConnectionHealth() {
            if (navigator.onLine === false) {
                setConnectionState('disconnected', 'Browser is offline.');
                return;
            }

            if (!lastSuccessfulRefreshAt) {
                setConnectionState('connecting', 'Waiting for the first successful refresh.');
                return;
            }

            const ageMs = Date.now() - lastSuccessfulRefreshAt.getTime();

            if (ageMs >= 15000) {
                setConnectionState('disconnected', `No successful refresh since ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
            } else if (ageMs >= 7000) {
                setConnectionState('reconnecting', `Refresh is delayed. Last success at ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
            } else if (connectionState !== 'connected') {
                setConnectionState('connected');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            captureScrollPositions(document);
            evaluateConnectionHealth();
            window.setInterval(evaluateConnectionHealth, 1000);

            document.body.addEventListener('htmx:beforeRequest', () => {
                captureScrollPositions(document);

                if (lastSuccessfulRefreshAt) {
                    const ageMs = Date.now() - lastSuccessfulRefreshAt.getTime();
                    if (ageMs >= 7000) {
                        setConnectionState('reconnecting', `Refresh is delayed. Last success at ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
                    }
                }
            });

            document.body.addEventListener('htmx:beforeSwap', (event) => {
                if (!event.detail || typeof event.detail.serverResponse !== 'string' || !window.expandedWorkflowCases?.size) {
                    return;
                }

                const target = event.target;
                const targetId = target?.id || '';
                const shouldPrepareWorkflow = targetId === 'workflow-dashboard' || targetId === 'main-dashboard';
                if (!shouldPrepareWorkflow) {
                    return;
                }

                const parser = new DOMParser();
                const responseDocument = parser.parseFromString(event.detail.serverResponse, 'text/html');
                const workflowRoot = responseDocument.body.firstElementChild;
                if (!workflowRoot) {
                    return;
                }

                applyExpandedWorkflowStateToRoot(workflowRoot);
                event.detail.serverResponse = responseDocument.body.innerHTML;
            });

            document.body.addEventListener('htmx:afterSwap', (event) => {
                restoreScrollPositions(event.target);
                applyExpandedWorkflowStateToRoot(event.target);
                restoreSelectedCase(event.target);
                if (typeof initializeLiveCaseTrackerColumnResize === 'function') {
                    initializeLiveCaseTrackerColumnResize(event.target);
                }
                markSuccessfulRefresh();
            });

            document.body.addEventListener('htmx:afterSettle', (event) => {
                restoreScrollPositions(event.target);
                applyExpandedWorkflowStateToRoot(event.target);
                restoreSelectedCase(event.target);
                if (typeof initializeLiveCaseTrackerColumnResize === 'function') {
                    initializeLiveCaseTrackerColumnResize(event.target);
                }
            });

            document.body.addEventListener('htmx:responseError', () => {
                setConnectionState('disconnected', `Request failed. Last success at ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
            });

            document.body.addEventListener('htmx:sendError', () => {
                setConnectionState('disconnected', `Network error. Last success at ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
            });

            document.body.addEventListener('htmx:timeout', () => {
                setConnectionState('disconnected', `Request timed out. Last success at ${formatTimestamp(lastSuccessfulRefreshAt)}.`);
            });

            document.body.addEventListener('click', (event) => {
                const caseRow = event.target.closest('[data-case-select-row][data-case-id]');
                if (caseRow) {
                    setSelectedCase(caseRow.dataset.caseId);
                }

                if (!event.target.closest('[data-close-modal]')) {
                    return;
                }

                event.preventDefault();
                closeModal();
            });

            document.addEventListener('keydown', (event) => {
                if (event.key !== 'Escape' || !document.getElementById('log-modal')) {
                    return;
                }

                closeModal();
            });

            window.addEventListener('offline', () => {
                setConnectionState('disconnected', 'Browser is offline.');
            });

            window.addEventListener('online', () => {
                evaluateConnectionHealth();
            });
        });
    </script>
    <style>
        .htmx-indicator{
            display:none;
        }
        .htmx-request .htmx-indicator{
            display:inline;
        }
        .htmx-request.htmx-indicator{
            display:inline;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col font-sans">
    
    <!-- Top Navigation Bar -->
    <header class="bg-indigo-900 text-white shadow-md p-4 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-bold">MQI Communicator</h1>
            <span id="connection-status-badge" class="text-sm text-white px-2 py-1 rounded-full font-medium bg-yellow-500">
                <span id="connection-status-label">Connecting</span>
            </span>
            <span id="connection-status-detail" class="text-xs text-indigo-100">Waiting for the first successful refresh.</span>
        </div>
        
        <nav class="flex space-x-4">
            <button 
                class="px-4 py-2 bg-indigo-800 hover:bg-indigo-700 rounded transition font-medium"
                hx-get="/ui/workflow" 
                hx-target="#main-dashboard">
                🔄 Workflow Monitor
            </button>
            <button 
                class="px-4 py-2 bg-indigo-800 hover:bg-indigo-700 rounded transition font-medium"
                hx-get="/ui/cases" 
                hx-target="#main-dashboard">
                📁 Case & Result Browser
            </button>
        </nav>
    </header>

    <div id="connection-banner" class="hidden bg-red-50 border-b border-red-200 px-6 py-3 text-red-800">
        <div class="flex items-start justify-between gap-4">
            <div>
                <p id="connection-banner-title" class="text-sm font-semibold">Dashboard disconnected</p>
                <p id="connection-banner-detail" class="text-sm">No fresh data is arriving. The screen may look normal, but it is stale.</p>
            </div>
            <button
                type="button"
                class="px-3 py-1.5 bg-red-600 text-white text-sm rounded hover:bg-red-700 transition"
                hx-get="/ui/workflow"
                hx-target="#main-dashboard">
                Retry now
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="main-dashboard" class="flex-grow p-6 overflow-hidden flex flex-col"
          hx-get="/ui/workflow" hx-trigger="load">
        <div class="flex justify-center items-center h-full text-gray-500">
            <span class="text-xl">Loading Dashboard...</span>
        </div>
    </main>

    <div id="health-ping" class="hidden" hx-get="/health" hx-trigger="every 5s"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

</body>
</html>
