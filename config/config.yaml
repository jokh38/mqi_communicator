# =====================================================================================
# Execution Handler - 각 프로세스 및 워크플로우 단계별 실행 모드 설정
# =====================================================================================
ExecutionHandler:
  GpuMonitor: "local"
  CsvInterpreter: "local"
  HpcFileHandler: "local"
  HpcJobSubmitter: "local"
  PostProcessor: "local"
  ResultUploader: "local"

# =====================================================================================
# Paths - 환경별 경로 설정
# =====================================================================================
paths:
  base_directory: "/home/jokh38/MOQUI_SMC"
  local:
    scan_directory: "{base_directory}/data/SHI_log"
    csv_output_dir: "{base_directory}/data/Outputs_csv"
    simulation_output_dir: "{base_directory}/data/Dose_dcm/{case_id}"
    final_dicom_dir: "{base_directory}/data/Dose_dcm/{case_id}"
    database_path: "{base_directory}/data/mqi_communicator.db"
    mqi_interpreter_dir: "{base_directory}/mqi_interpreter"
    mqi_run_dir: "{base_directory}/moqui"
    raw_to_dicom_dir: "{base_directory}/RawToDCM"
    tps_input_file: "{base_directory}/data/Outputs_csv/{case_id}/moqui_tps_{beam_id}.in"  # Generated per-beam TPS files
    log_path: "{base_directory}/mqi_communicator/logs/sim_{beam_id}.log"

# =====================================================================================
# Executables - 환경별 실행 파일 경로 설정
# =====================================================================================
executables:
  local:
    python: "/home/jokh38/miniconda3/bin/python"
    mqi_interpreter_script: "{base_directory}/mqi_interpreter/main_cli.py"
    raw_to_dicom_script: "{base_directory}/RawToDCM/moqui_raw2dicom.py"

# =====================================================================================
# Command Templates - 실행 명령어 템플릿
# =====================================================================================
command_templates:
  local:
    interpret_csv: >-
      cd {mqi_interpreter_dir} && {python} {mqi_interpreter_script} --logdir {input_path} --outputdir {csv_output_dir}
    post_process: >-
      cd {raw_to_dicom_dir} && {python} {raw_to_dicom_script} --input {input_file} --output {output_dir} --dosetype 2d
    # W-7 fix: Remove trailing & to allow proper process tracking
    submit_simulation: "cd {mqi_run_dir} && ./tps_env/tps_env {tps_input_file} > {log_path} 2>&1"
    cleanup: "rm -rf {target_path}"

# =====================================================================================
# Database - SQLite 데이터베이스 설정
# =====================================================================================
database:
  cache_size_mb: 64
  busy_timeout_ms: 5000
  connection_timeout_seconds: 30
  journal_mode: "WAL"
  synchronous_mode: "NORMAL"
  enable_foreign_keys: true

# =====================================================================================
# Processing - 워커 및 타임아웃 설정
# =====================================================================================
processing:
  max_workers: 4
  case_timeout_seconds: 3600
  scan_interval_seconds: 60
  hpc_poll_interval_seconds: 30
  hpc_job_timeout_seconds: 3600
  max_case_retries: 3  # W-4 fix: Maximum retries for failed cases

# =====================================================================================
# Completion Markers - 시뮬레이션 완료 감지용 패턴
# =====================================================================================
completion_markers:
  success_pattern: "Total execution time:"
  failure_patterns:
    - "FATAL ERROR"
    - "ERROR:"
    - "Segmentation fault"

logging:
  log_dir: "logs"
  log_level: "INFO"
  console_level: "INFO"
  max_file_size_mb: 10
  backup_count: 5
  tz_hours: 9

gpu:
  gpu_monitor_command: "nvidia-smi --query-gpu=index,uuid,name,memory.total,memory.used,memory.free,temperature.gpu,utilization.gpu --format=csv,noheader,nounits"
  monitor_interval: 10
  assignment_grace_period_seconds: 60

# =====================================================================================
# UI - Dashboard 설정
# =====================================================================================
ui:
  mode: "web"                        # Choose "web" (HTMX) or "terminal" (Rich UI)
  auto_start: true
  port: 8501
  web:
    port: 8080                        # Port for web dashboard
    host: "0.0.0.0"                   # Interface to bind to


# =====================================================================================
# moqui_tps.in - MC simulation 설정파일 생성용 파라미터
# =====================================================================================
tps_generator:
  validation:
    required_params:
      - 'GPUID'
      - 'DicomDir'
      - 'logFilePath'
      - 'OutputDir'
      - 'BeamNumbers'
  default_paths:
    base_directory: "/home/jokh38/MOQUI_SMC"
    interpreter_outputs_dir: "{paths.local.csv_output_dir}"
    outputs_dir: "{paths.local.simulation_output_dir}"

moqui_tps_parameters:
  GPUID: 0
  RandomSeed: -1932780356
  UseAbsolutePath: false
  TotalThreads: -1
  MaxHistoriesPerBatch: 10000000
  Verbosity: 0
  ParentDir: "../data/Outputs_csv/{case_id}"
  DicomDir: "rtplan"
  logFilePath: "log"
  OutputDir: "../data/Dose_dcm/{case_id}"
  GantryNum: 0
  UsingPhantomGeo: true
  TwoCentimeterMode: true
  PhantomDimX: 400
  PhantomDimY: 400
  PhantomDimZ: 400
  PhantomUnitX: 1
  PhantomUnitY: 1
  PhantomUnitZ: 1
  PhantomPositionX: -200.0
  PhantomPositionY: -200.0
  PhantomPositionZ: -380.0
  Scorer: Dose
  SupressStd: true
  ReadStructure: true
  ROIName: External
  SourceType: FluenceMap
  SimulationType: perBeam
  BeamNumbers: 1
  ParticlesPerHistory: 0.1
  ScoreToCTGrid: true
  OutputFormat: dcm
  OverwriteResults: true
