ExecutionHandler:
  GpuMonitor: "local"
  CsvInterpreter: "local"
  HpcFileHandler: "local"
  HpcJobSubmitter: "local"
  PostProcessor: "local"
  ResultUploader: "local"

paths:
  base_directory: "/home/SMC/MOQUI_SMC"
  local:
    scan_directory: "{base_directory}/data/SHI_log"
    csv_output_dir: "{base_directory}/data/Output"
    ptn_checker_output_dir: "{base_directory}/data/Output/{room_path}{case_id}/Daily_PTN"
    simulation_output_dir: "{base_directory}/data/Output/{room_path}{case_id}/Dose"
    final_dicom_dir: "{base_directory}/data/Output/{room_path}{case_id}/Dose"
    database_path: "{base_directory}/data/mqi_communicator.db"
    mqi_interpreter_dir: "{base_directory}/mqi_interpreter"
    mqi_run_dir: "{base_directory}/moqui_SMC"
    raw_to_dicom_dir: "{base_directory}/RawToDCM"
    tps_input_file: "{base_directory}/data/Output/{room_path}{case_id}/Log_csv/moqui_tps_{beam_id}.in"  # Generated per-beam TPS files
    log_path: "{base_directory}/mqi_communicator/logs/sim_{beam_id}.log"

executables:
  local:
    python: "/home/SMC/MOQUI_SMC/mqi_communicator/.venv/bin/python3"
    mqi_interpreter_script: "{base_directory}/mqi_interpreter/main_cli.py"
    raw_to_dicom_script: "{base_directory}/RawToDCM/moqui_raw2dicom.py"

command_templates:
  local:
    interpret_csv: >-
      cd {mqi_interpreter_dir} && {python} {mqi_interpreter_script} --logdir {input_path} --outputdir {csv_output_dir}
    post_process: >-
      cd {raw_to_dicom_dir} && {python} {raw_to_dicom_script} --input {input_file} --output {output_dir} --dosetype 2d
    submit_simulation: "cd {mqi_run_dir} && ./build/tps_env/tps_env {tps_input_file} > {log_path} 2>&1"
    cleanup: "rm -rf {target_path}"

database:
  cache_size_mb: 64
  busy_timeout_ms: 5000
  connection_timeout_seconds: 30
  journal_mode: "WAL"
  synchronous_mode: "NORMAL"
  enable_foreign_keys: true

processing:
  max_workers: 4
  case_timeout_seconds: 3600
  scan_interval_seconds: 60
  hpc_poll_interval_seconds: 30
  hpc_job_timeout_seconds: 3600
  max_case_retries: 3  # W-4 fix: Maximum retries for failed cases

completion_markers:
  success_pattern: "Total execution time:"
  failure_patterns:
    - "FATAL ERROR"
    - "ERROR:"
    - "Segmentation fault"

logging:
  log_dir: "logs"
  log_level: "INFO"
  console_level: "INFO"
  max_file_size_mb: 10
  backup_count: 5
  tz_hours: 9

gpu:
  gpu_monitor_command: "nvidia-smi --query-gpu=index,uuid,name,memory.total,memory.used,memory.free,temperature.gpu,utilization.gpu,clocks.gr --format=csv,noheader,nounits"
  monitor_interval: 10
  assignment_grace_period_seconds: 60

moqui_runtime:
  multigpu_enabled: true
  beam_uses_all_available_gpus: true
  max_gpus_per_beam: 4

ptn_checker:
  path: "/home/SMC/MOQUI_SMC/ptn_checker"
  output_subdir: "ptn_checker_output"
  stability_window_seconds: 30
  min_file_age_seconds: 5
  size_poll_interval_seconds: 1

ui:
  mode: "web"                        # Choose "web" (HTMX) or "terminal" (Rich UI)
  auto_start: true
  port: 8501
  web:
    port: 8080                        # Port for web dashboard
    host: "0.0.0.0"                   # Interface to bind to


tps_generator:
  validation:
    required_params:
      - 'GPUID'
      - 'DicomPath'
      - 'logFilePath'
      - 'OutputDir'
      - 'BeamNumbers'
      - 'GantryNum'
  default_paths:
    base_directory: "/home/SMC/MOQUI_SMC"
    interpreter_outputs_dir: "{paths.local.csv_output_dir}"
    outputs_dir: "{paths.local.simulation_output_dir}"

moqui_tps_parameters:
  GPUID: 0
  RandomSeed: -1932780356
  UseAbsolutePath: true
  TotalThreads: -1
  MaxHistoriesPerBatch: 10000000
  Verbosity: 0
  ParentDir: "{base_directory}/data/Output/{room_path}{case_id}/Log_csv"
  DicomPath: "{base_directory}/data/Output/{room_path}{case_id}/Log_csv/plan"
  DicomDir: "plan"
  logFilePath: "{base_directory}/data/Output/{room_path}{case_id}/Log_csv/log"
  OutputDir: "{base_directory}/data/Output/{room_path}{case_id}/Dose"
  GantryNum: 2
  UsingPhantomGeo: true
  TwoCentimeterMode: true
  PhantomDimX: 400
  PhantomDimY: 400
  PhantomDimZ: 400
  PhantomUnitX: 1
  PhantomUnitY: 1
  PhantomUnitZ: 1
  PhantomPositionX: -200.0
  PhantomPositionY: -200.0
  PhantomPositionZ: -380.0
  Scorer: Dose
  SupressStd: true
  ReadStructure: true
  BodyContourName: External
  SourceType: FluenceMap
  SimulationType: perBeam
  BeamNumbers: 1
  NormalizeTotalHistories: 500000000
  ScoreToCTGrid: true
  OutputFormat: dcm
  OverwriteResults: true
  EnableBeamLayerMultiGpu: true
  BeamLayerMultiGpuAllowedGpuIds: ""
  BeamLayerMultiGpuMaxWorkers: 0
  BeamLayerMultiGpuTempRoot: "{base_directory}/moqui_SMC/run_data_g1g2_work_all_mgpu/.beam_layer_multi_gpu"
