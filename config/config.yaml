# config/config.yaml

dashboard:
  auto_start: true
  refresh_interval_seconds: 2

application:
  max_workers: 4
  scan_interval_seconds: 60
  polling_interval_seconds: 300
  local_execution_timeout_seconds: 300

paths:
  base_directory: "/home/jokh38/MOQUI_SMC"
  local:
    scan_directory: "{base_directory}/Outputs_csv"
    database_path: "{base_directory}/tps_env/database/mqi_communicator.db"
    csv_output_directory: "{base_directory}/tps_env/data/cases/{case_id}/output_csv"
    raw_output_directory: "{base_directory}/Dose_raw/{case_id}"
    final_dicom_directory: "{base_directory}/tps_env/data/cases/{case_id}/dicom"
  hpc:
    base_dir: "~/MOQUI_SMC"
    tps_env_dir: "~/MOQUI_SMC/tps_env"
    remote_case_path_template: "~/MOQUI_SMC/cases"

executables:
  python_interpreter: "/usr/bin/python3"
  mqi_interpreter_script: "{base_directory}/mqi_interpreter/main_cli.py"
  raw_to_dicom_script: "{base_directory}/RawToDCM/moqui_raw2dicom.py"

command_templates:
  mqi_interpreter: >-
    {python_interpreter} {mqi_interpreter_script}
    --logdir {beam_directory}
    --outputdir {output_dir}
  raw_to_dicom: >-
    {python_interpreter} {raw_to_dicom_script}
    --input {input_file}
    --output {output_dir}

hpc_connection:
  host: "localhost"
  user: "jokh38"
  ssh_key_path: "/home/jokh38/.ssh/id_rsa"
  connection_timeout_seconds: 10
  command_timeout_seconds: 600

# --- New Section: PC_localdata connection information ---
pc_localdata_connection:
  host: "PC_LOCALDATA_IP_ADDRESS"
  user: "WINDOWS_USERNAME"
  ssh_key_path: "/home/jokh38/.ssh/id_rsa_for_localdata"
  remote_base_dir: "D:/MOQUI_RESULTS"

retry_policy:
  max_retries: 3
  initial_delay_seconds: 5
  max_delay_seconds: 60
  backoff_multiplier: 2.0

database:
  cache_size_mb: 64
  busy_timeout_ms: 5000
  journal_mode: "WAL"
  synchronous_mode: "NORMAL"
  enable_foreign_keys: true

logging:
  log_dir: "{base_directory}/mqi_communicator/logs/"
  log_level: "INFO"
  console_level: "INFO"
  tz_hours: 9

curator:
  gpu_monitor_command: "nvidia-smi --query-gpu=index,uuid,name,memory.total,memory.used,memory.free,temperature.gpu,utilization.gpu --format=csv,noheader,nounits"
  gpu_monitor_interval_seconds: 10

tps_generator:
  validation:
    required_params:
      - 'GPUID'
      - 'DicomDir'
      - 'logFilePath'
      - 'OutputDir'
      - 'BeamNumbers'
  default_paths:
    base_dir: "/home/gpuadmin/MOQUI_SMC"
    interpreter_outputs_dir: "/home/gpuadmin/Outputs_csv"
    outputs_dir: "/home/gpuadmin/Dose_raw"

moqui_tps_parameters:
  GPUID: 0
  RandomSeed: -1932780356
  UseAbsolutePath: false
  TotalThreads: -1
  MaxHistoriesPerBatch: 600000000
  Verbosity: 0
  ParentDir: ""
  DicomDir: ""
  logFilePath: ""
  GantryNum: 0
  UsingPhantomGeo: true
  TwoCentimeterMode: true
  PhantomDimX: 400
  PhantomDimY: 400
  PhantomDimZ: 400
  PhantomUnitX: 1
  PhantomUnitY: 1
  PhantomUnitZ: 1
  PhantomPositionX: -200.0
  PhantomPositionY: -200.0
  PhantomPositionZ: -380.0
  Scorer: Dose
  SupressStd: true
  ReadStructure: true
  ROIName: External
  SourceType: FluenceMap
  SimulationType: perBeam
  BeamNumbers: 1
  ParticlesPerHistory: 1
  ScoreToCTGrid: true
  OutputDir: ""
  OutputFormat: raw
  OverwriteResults: true
